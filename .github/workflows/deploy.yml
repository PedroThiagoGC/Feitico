name: Deploy Pipeline

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVER_PATH: ${{ secrets.SERVER_PATH != '' && secrets.SERVER_PATH || '/root/feitico' }}
    concurrency:
      group: deploy-${{ github.ref_name }}
      cancel-in-progress: true

    steps:
      - name: Validate Required Secrets
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Secret SSH_PRIVATE_KEY não configurado."
            exit 1
          fi

          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "::error::Secret SERVER_HOST não configurado."
            exit 1
          fi

          if [ -z "${{ secrets.SERVER_USER }}" ]; then
            echo "::error::Secret SERVER_USER não configurado."
            exit 1
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to Server
        id: deploy
        run: |
          set -euo pipefail

          ssh-add -l
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

          TARGET_ENV="dev"
          if [ "${{ github.ref_name }}" = "main" ]; then
            TARGET_ENV="prod"
          fi

          echo "Iniciando deploy para: $TARGET_ENV (Branch: ${{ github.ref_name }})"

          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            cd $SERVER_PATH

            echo 'Atualizando repositório...'
            git fetch --all
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            echo "Executando ./deploy.sh $TARGET_ENV ..."
            chmod +x deploy.sh
            if ./deploy.sh $TARGET_ENV; then
              echo 'Deploy concluído com sucesso!'
              exit 0
            else
              echo 'ERRO: Deploy falhou.'
              exit 1
            fi
          "

      - name: Deploy Success
        run: |
          echo "::notice::Deploy realizado com sucesso para o ambiente ${{ github.ref_name }}!"
